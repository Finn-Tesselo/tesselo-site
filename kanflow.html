<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanflow — Task Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #141418;
            --bg-raised: #1c1c22;
            --bg-card: #22222a;
            --bg-hover: #2a2a34;
            --bg-input: #1a1a20;
            --border: #2e2e38;
            --border-light: #3a3a46;
            --text: #e8e6e3;
            --text-muted: #7a7886;
            --text-dim: #555360;
            --blue: #4e8cff;
            --blue-glow: rgba(78, 140, 255, 0.15);
            --blue-dim: #3a6acc;
            --green: #34d399;
            --green-bg: rgba(52, 211, 153, 0.12);
            --amber: #fbbf24;
            --amber-bg: rgba(251, 191, 36, 0.12);
            --red: #f87171;
            --red-bg: rgba(248, 113, 113, 0.12);
            --purple: #a78bfa;
            --purple-bg: rgba(167, 139, 250, 0.12);
            --font: 'Manrope', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --radius: 10px;
            --radius-sm: 6px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        ::selection { background: var(--blue); color: white; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overflow-x: auto;
            min-height: 100vh;
        }

        /* ─── DEMO BANNER ─── */
        .demo-banner {
            background: var(--blue);
            color: white;
            text-align: center;
            padding: 0.5rem 1rem;
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.03em;
        }

        .demo-banner a { color: white; }

        /* ─── HEADER ─── */
        .header {
            background: var(--bg-raised);
            border-bottom: 1px solid var(--border);
            padding: 0.9rem 1.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--text);
        }

        .logo span { color: var(--blue); }

        .project-name {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            padding: 0.35rem 0.75rem;
            background: var(--bg);
            border-radius: 100px;
            border: 1px solid var(--border);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .avatar-group {
            display: flex;
            margin-right: 0.5rem;
        }

        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 600;
            border: 2px solid var(--bg-raised);
            margin-left: -8px;
            position: relative;
        }

        .avatar:first-child { margin-left: 0; }
        .avatar-blue { background: var(--blue); color: white; }
        .avatar-green { background: var(--green); color: #0a0a0a; }
        .avatar-purple { background: var(--purple); color: white; }
        .avatar-amber { background: var(--amber); color: #0a0a0a; }

        .btn {
            font-family: var(--font);
            font-size: 0.78rem;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn-primary {
            background: var(--blue);
            color: white;
        }

        .btn-primary:hover { background: var(--blue-dim); }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            border-color: var(--border-light);
            color: var(--text);
        }

        /* ─── PROGRESS BAR ─── */
        .progress-bar-container {
            background: var(--bg-raised);
            padding: 0.6rem 1.75rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .progress-label {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-muted);
            white-space: nowrap;
            font-family: var(--font-mono);
        }

        .progress-track {
            flex: 1;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--blue), var(--green));
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .progress-pct {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--green);
            font-family: var(--font-mono);
        }

        /* ─── BOARD ─── */
        .board {
            display: flex;
            gap: 1rem;
            padding: 1.5rem 1.75rem;
            min-height: calc(100vh - 140px);
            align-items: flex-start;
        }

        .column {
            flex: 1;
            min-width: 300px;
            max-width: 380px;
            background: var(--bg-raised);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 170px);
            overflow: hidden;
        }

        .column-header {
            padding: 1rem 1.15rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .column-title {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .column-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .dot-todo { background: var(--text-muted); }
        .dot-progress { background: var(--blue); box-shadow: 0 0 8px var(--blue-glow); }
        .dot-done { background: var(--green); }

        .column-count {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-dim);
            background: var(--bg);
            padding: 0.2rem 0.55rem;
            border-radius: 100px;
            font-family: var(--font-mono);
        }

        .column-body {
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            overflow-y: auto;
            flex: 1;
            min-height: 100px;
        }

        .column-body.drag-over {
            background: var(--blue-glow);
            border-radius: 0 0 var(--radius) var(--radius);
        }

        /* ─── CARDS ─── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 1rem;
            cursor: grab;
            transition: all 0.2s;
            position: relative;
        }

        .card:hover {
            border-color: var(--border-light);
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            transform: translateY(-1px);
        }

        .card:active { cursor: grabbing; }

        .card.dragging {
            opacity: 0.4;
            transform: rotate(2deg);
        }

        .card-title {
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .card-description {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            line-height: 1.5;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-tags {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.65rem;
            font-weight: 600;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .tag-high { background: var(--red-bg); color: var(--red); }
        .tag-medium { background: var(--amber-bg); color: var(--amber); }
        .tag-low { background: var(--green-bg); color: var(--green); }
        .tag-feature { background: var(--purple-bg); color: var(--purple); }
        .tag-bug { background: var(--red-bg); color: var(--red); }
        .tag-design { background: var(--blue-glow); color: var(--blue); }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-avatar {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.55rem;
            font-weight: 700;
        }

        .card-due {
            font-size: 0.68rem;
            color: var(--text-dim);
            font-family: var(--font-mono);
        }

        .card-due.overdue { color: var(--red); }

        .card-delete {
            position: absolute;
            top: 0.6rem;
            right: 0.6rem;
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.75rem;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .card:hover .card-delete { display: flex; }
        .card-delete:hover { background: var(--red-bg); color: var(--red); }

        /* ─── ADD CARD ─── */
        .add-card-btn {
            padding: 0.65rem;
            border: 1px dashed var(--border);
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-dim);
            font-family: var(--font);
            font-size: 0.78rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            flex-shrink: 0;
            margin: 0 0.75rem 0.75rem;
        }

        .add-card-btn:hover {
            border-color: var(--blue);
            color: var(--blue);
            background: var(--blue-glow);
        }

        /* ─── MODAL ─── */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: var(--bg-raised);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.75rem;
            width: 420px;
            max-width: 90vw;
            animation: slideUp 0.25s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal h3 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            color: var(--text);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.35rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: var(--font);
            font-size: 0.85rem;
            color: var(--text);
            background: var(--bg-input);
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--blue);
        }

        .form-group textarea { resize: vertical; min-height: 60px; }

        .form-group select { cursor: pointer; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .modal-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 900px) {
            .board { padding: 1rem; }
            .column { min-width: 270px; }
            .header { padding: 0.75rem 1rem; }
            .progress-bar-container { padding: 0.5rem 1rem; }
        }
    </style>
</head>
<body>

<div class="demo-banner">
    Portfolio Demo — Built by <a href="https://tesselo.dev">Tesselo</a> using AI-assisted development
</div>

<header class="header">
    <div class="header-left">
        <div class="logo">kan<span>flow</span></div>
        <span class="project-name">Website Redesign</span>
    </div>
    <div class="header-right">
        <div class="avatar-group">
            <div class="avatar avatar-blue">FA</div>
            <div class="avatar avatar-green">SK</div>
            <div class="avatar avatar-purple">MJ</div>
            <div class="avatar avatar-amber">RL</div>
        </div>
        <button class="btn btn-primary" onclick="openModal('todo')">+ New Task</button>
    </div>
</header>

<div class="progress-bar-container">
    <span class="progress-label">Sprint Progress</span>
    <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
    </div>
    <span class="progress-pct" id="progress-pct">0%</span>
</div>

<div class="board" id="board"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" style="display: none;" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <h3>New Task</h3>
        <div class="form-group">
            <label>Title</label>
            <input type="text" id="task-title" placeholder="What needs to be done?">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="task-desc" placeholder="Add some details..."></textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Priority</label>
                <select id="task-priority">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            <div class="form-group">
                <label>Type</label>
                <select id="task-type">
                    <option value="feature">Feature</option>
                    <option value="bug">Bug</option>
                    <option value="design">Design</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Assignee</label>
                <select id="task-assignee">
                    <option value="FA">Finn A.</option>
                    <option value="SK">Sarah K.</option>
                    <option value="MJ">Max J.</option>
                    <option value="RL">Ruby L.</option>
                </select>
            </div>
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" id="task-due">
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-ghost" onclick="document.getElementById('modal').style.display='none'">Cancel</button>
            <button class="btn btn-primary" onclick="addTask()">Create Task</button>
        </div>
    </div>
</div>

<script>
    // ─── DATA ───
    const avatarColors = {
        'FA': 'avatar-blue',
        'SK': 'avatar-green',
        'MJ': 'avatar-purple',
        'RL': 'avatar-amber'
    };

    let tasks = [
        {
            id: 1, title: 'Design new landing page hero', description: 'Create wireframes and final mockup for the updated hero section with animation concepts.',
            column: 'done', priority: 'high', type: 'design', assignee: 'FA', due: '2026-03-25'
        },
        {
            id: 2, title: 'Implement authentication flow', description: 'Set up sign-up, login, and password reset using OAuth 2.0.',
            column: 'done', priority: 'high', type: 'feature', assignee: 'SK', due: '2026-03-26'
        },
        {
            id: 3, title: 'Build dashboard API endpoints', description: 'REST API for user analytics, activity feed, and notification preferences.',
            column: 'progress', priority: 'high', type: 'feature', assignee: 'FA', due: '2026-03-30'
        },
        {
            id: 4, title: 'Fix mobile nav z-index bug', description: 'Navigation overlay clips behind hero carousel on iOS Safari.',
            column: 'progress', priority: 'medium', type: 'bug', assignee: 'MJ', due: '2026-03-29'
        },
        {
            id: 5, title: 'Design onboarding illustrations', description: 'Create 4 custom illustrations for the onboarding carousel screens.',
            column: 'progress', priority: 'low', type: 'design', assignee: 'RL', due: '2026-04-02'
        },
        {
            id: 6, title: 'Set up CI/CD pipeline', description: 'Configure GitHub Actions for automated testing and deployment to staging.',
            column: 'todo', priority: 'medium', type: 'feature', assignee: 'SK', due: '2026-04-01'
        },
        {
            id: 7, title: 'Write API documentation', description: 'Document all endpoints with request/response examples using OpenAPI spec.',
            column: 'todo', priority: 'low', type: 'feature', assignee: 'FA', due: '2026-04-05'
        },
        {
            id: 8, title: 'Accessibility audit', description: 'Run WCAG 2.1 AA audit and fix critical issues across all pages.',
            column: 'todo', priority: 'high', type: 'bug', assignee: 'MJ', due: '2026-04-03'
        },
        {
            id: 9, title: 'Design email templates', description: 'Responsive HTML templates for welcome, reset password, and weekly digest.',
            column: 'todo', priority: 'medium', type: 'design', assignee: 'RL', due: '2026-04-07'
        },
        {
            id: 10, title: 'Implement dark mode toggle', description: 'Add theme switcher with system preference detection and local storage.',
            column: 'done', priority: 'medium', type: 'feature', assignee: 'MJ', due: '2026-03-24'
        }
    ];

    let nextId = 11;
    let modalColumn = 'todo';
    let draggedId = null;

    const columns = [
        { id: 'todo', label: 'To Do', dot: 'dot-todo' },
        { id: 'progress', label: 'In Progress', dot: 'dot-progress' },
        { id: 'done', label: 'Done', dot: 'dot-done' }
    ];

    // ─── RENDER ───
    function render() {
        const board = document.getElementById('board');
        board.innerHTML = columns.map(col => {
            const colTasks = tasks.filter(t => t.column === col.id);
            return `
                <div class="column">
                    <div class="column-header">
                        <div class="column-title">
                            <span class="column-dot ${col.dot}"></span>
                            ${col.label}
                        </div>
                        <span class="column-count">${colTasks.length}</span>
                    </div>
                    <div class="column-body" id="col-${col.id}"
                        ondragover="handleDragOver(event)"
                        ondragleave="handleDragLeave(event)"
                        ondrop="handleDrop(event, '${col.id}')">
                        ${colTasks.map(t => renderCard(t)).join('')}
                    </div>
                    <button class="add-card-btn" onclick="openModal('${col.id}')">+ Add task</button>
                </div>
            `;
        }).join('');

        updateProgress();
    }

    function renderCard(t) {
        const today = new Date();
        const due = new Date(t.due);
        const isOverdue = t.column !== 'done' && due < today;
        const dueStr = due.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });

        return `
            <div class="card" draggable="true"
                ondragstart="handleDragStart(event, ${t.id})"
                ondragend="handleDragEnd(event)"
                id="card-${t.id}">
                <button class="card-delete" onclick="deleteTask(${t.id})" title="Delete">×</button>
                <div class="card-title">${t.title}</div>
                <div class="card-description">${t.description}</div>
                <div class="card-footer">
                    <div class="card-tags">
                        <span class="tag tag-${t.priority}">${t.priority}</span>
                        <span class="tag tag-${t.type}">${t.type}</span>
                    </div>
                    <div class="card-meta">
                        <span class="card-due ${isOverdue ? 'overdue' : ''}">${dueStr}</span>
                        <div class="card-avatar ${avatarColors[t.assignee]}">${t.assignee}</div>
                    </div>
                </div>
            </div>
        `;
    }

    function updateProgress() {
        const done = tasks.filter(t => t.column === 'done').length;
        const total = tasks.length;
        const pct = total === 0 ? 0 : Math.round((done / total) * 100);
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('progress-pct').textContent = pct + '%';
    }

    // ─── DRAG & DROP ───
    function handleDragStart(e, id) {
        draggedId = id;
        e.target.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
    }

    function handleDragEnd(e) {
        e.target.classList.remove('dragging');
        document.querySelectorAll('.column-body').forEach(c => c.classList.remove('drag-over'));
    }

    function handleDragOver(e) {
        e.preventDefault();
        e.currentTarget.classList.add('drag-over');
    }

    function handleDragLeave(e) {
        e.currentTarget.classList.remove('drag-over');
    }

    function handleDrop(e, column) {
        e.preventDefault();
        e.currentTarget.classList.remove('drag-over');
        if (draggedId !== null) {
            const task = tasks.find(t => t.id === draggedId);
            if (task) {
                task.column = column;
                render();
            }
            draggedId = null;
        }
    }

    // ─── MODAL ───
    function openModal(col) {
        modalColumn = col;
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('task-title').value = '';
        document.getElementById('task-desc').value = '';
        document.getElementById('task-priority').value = 'medium';
        document.getElementById('task-type').value = 'feature';
        document.getElementById('task-assignee').value = 'FA';
        document.getElementById('task-due').value = '';
        setTimeout(() => document.getElementById('task-title').focus(), 100);
    }

    function closeModal(e) {
        if (e.target === e.currentTarget) {
            document.getElementById('modal').style.display = 'none';
        }
    }

    function addTask() {
        const title = document.getElementById('task-title').value.trim();
        if (!title) { document.getElementById('task-title').focus(); return; }

        const task = {
            id: nextId++,
            title: title,
            description: document.getElementById('task-desc').value.trim() || 'No description provided.',
            column: modalColumn,
            priority: document.getElementById('task-priority').value,
            type: document.getElementById('task-type').value,
            assignee: document.getElementById('task-assignee').value,
            due: document.getElementById('task-due').value || '2026-04-15'
        };

        tasks.push(task);
        document.getElementById('modal').style.display = 'none';
        render();
    }

    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        render();
    }

    // ─── KEYBOARD ───
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            document.getElementById('modal').style.display = 'none';
        }
    });

    // ─── INIT ───
    render();
</script>

</body>
</html>
