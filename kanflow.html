<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanflow — Task Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f14;
            --bg-panel: #111318;
            --bg-card: #161920;
            --bg-card-hover: #1b1e27;
            --bg-input: #0f1117;
            --border: rgba(255,255,255,0.06);
            --border-mid: rgba(255,255,255,0.1);
            --border-bright: rgba(255,255,255,0.16);
            --text: #e8e6f0;
            --text-muted: #6b6880;
            --text-dim: #3d3b50;
            --coral: #ff5c4d;
            --coral-dim: rgba(255,92,77,0.12);
            --coral-glow: rgba(255,92,77,0.25);
            --amber: #f59e0b;
            --amber-dim: rgba(245,158,11,0.12);
            --green: #34d399;
            --green-dim: rgba(52,211,153,0.12);
            --blue: #60a5fa;
            --blue-dim: rgba(96,165,250,0.12);
            --purple: #a78bfa;
            --purple-dim: rgba(167,139,250,0.12);
            --font: 'DM Sans', -apple-system, sans-serif;
            --font-mono: 'DM Mono', monospace;
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-sharp: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        ::selection { background: var(--coral); color: white; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overflow-x: auto;
            min-height: 100vh;
        }

        /* ─── NOISE TEXTURE OVERLAY ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        /* ─── DEMO BANNER ─── */
        .demo-banner {
            position: relative;
            z-index: 10;
            background: var(--coral);
            color: white;
            text-align: center;
            padding: 0.45rem 1rem;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.04em;
        }
        .demo-banner a { color: white; text-decoration: underline; }

        /* ─── HEADER ─── */
        .header {
            position: relative;
            z-index: 10;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 0 1.75rem;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left { display: flex; align-items: center; gap: 1.25rem; }

        .logo {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: -0.04em;
            color: var(--text);
            font-family: var(--font-mono);
        }
        .logo em { color: var(--coral); font-style: normal; }

        .project-pill {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-muted);
            padding: 0.25rem 0.7rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 100px;
            letter-spacing: 0.02em;
        }

        .header-right { display: flex; align-items: center; gap: 0.75rem; }

        .avatar-group { display: flex; }
        .avatar {
            width: 26px; height: 26px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.6rem; font-weight: 600;
            border: 2px solid var(--bg-panel);
            margin-left: -6px;
            transition: transform 0.2s var(--ease-out), z-index 0s;
            cursor: default;
        }
        .avatar:first-child { margin-left: 0; }
        .avatar:hover { transform: translateY(-2px) scale(1.1); z-index: 10; }
        .av-coral { background: var(--coral); color: white; }
        .av-green { background: var(--green); color: #0a0a0a; }
        .av-purple { background: var(--purple); color: white; }
        .av-amber { background: var(--amber); color: #0a0a0a; }

        .btn {
            font-family: var(--font);
            font-size: 0.75rem;
            font-weight: 500;
            padding: 0.45rem 0.9rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: all 0.18s var(--ease-sharp);
            display: inline-flex; align-items: center; gap: 0.35rem;
            letter-spacing: 0.01em;
        }
        .btn-primary {
            background: var(--coral);
            color: white;
        }
        .btn-primary:hover {
            background: #ff7060;
            box-shadow: 0 0 20px var(--coral-glow);
            transform: translateY(-1px);
        }
        .btn-primary:active { transform: scale(0.97); }
        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { border-color: var(--border-mid); color: var(--text); }

        /* ─── SPRINT DASHBOARD STRIP ─── */
        .sprint-strip {
            position: relative;
            z-index: 10;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 0 1.75rem;
            height: 44px;
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .sprint-stat {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-shrink: 0;
        }

        .sprint-label {
            font-size: 0.68rem;
            font-weight: 500;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-family: var(--font-mono);
        }

        .sprint-value {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        .sprint-divider {
            width: 1px;
            height: 20px;
            background: var(--border);
            flex-shrink: 0;
        }

        .progress-track-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .progress-track {
            flex: 1;
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: visible;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--coral), #ff8a7a);
            border-radius: 2px;
            transition: width 0.7s var(--ease-out);
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: -1px;
            top: 50%;
            transform: translateY(-50%);
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--coral);
            box-shadow: 0 0 8px var(--coral-glow);
            transition: opacity 0.3s;
        }

        .progress-pct {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--coral);
            font-family: var(--font-mono);
            white-space: nowrap;
            min-width: 2.5rem;
            text-align: right;
        }

        /* ─── SPARKLINE ─── */
        .sparkline { height: 20px; display: flex; align-items: flex-end; gap: 2px; }
        .spark-bar {
            width: 3px;
            background: var(--coral);
            border-radius: 2px 2px 0 0;
            opacity: 0.3;
            transition: opacity 0.2s;
        }
        .spark-bar.active { opacity: 1; }
        .spark-bar.med { opacity: 0.6; }

        /* ─── BOARD ─── */
        .board {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 1px;
            padding: 0;
            min-height: calc(100vh - 120px);
            align-items: stretch;
            background: var(--border);
        }

        .column {
            flex: 1;
            min-width: 300px;
            background: var(--bg-panel);
            display: flex;
            flex-direction: column;
            position: relative;
            transition: background 0.25s var(--ease-out);
        }

        /* Gradient fill — darker at bottom */
        .column::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.3) 100%);
            pointer-events: none;
        }

        .column.drag-over {
            background: #131620;
        }

        .column-header {
            padding: 1.1rem 1.25rem 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 2;
        }

        .column-title-wrap { display: flex; align-items: center; gap: 0.6rem; }

        .col-indicator {
            width: 6px; height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .ind-todo { background: var(--text-dim); }
        .ind-progress {
            background: var(--coral);
            box-shadow: 0 0 8px var(--coral-glow);
            animation: pulse-dot 2s infinite;
        }
        .ind-done { background: var(--green); }

        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 6px var(--coral-glow); }
            50% { box-shadow: 0 0 12px var(--coral-glow), 0 0 20px rgba(255,92,77,0.15); }
        }

        .column-title {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }

        .column-count {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            font-weight: 500;
            color: var(--text-dim);
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            padding: 0.15rem 0.5rem;
            border-radius: 100px;
            transition: all 0.3s var(--ease-out);
        }

        .column-count.pop {
            animation: count-pop 0.4s var(--ease-out);
        }

        @keyframes count-pop {
            0% { transform: scale(1); }
            40% { transform: scale(1.35); color: var(--coral); border-color: var(--coral-dim); }
            100% { transform: scale(1); }
        }

        .column-body {
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.55rem;
            overflow-y: auto;
            flex: 1;
            min-height: 80px;
            position: relative;
            z-index: 2;
        }

        .column-body::-webkit-scrollbar { width: 3px; }
        .column-body::-webkit-scrollbar-track { background: transparent; }
        .column-body::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }

        /* ─── DROP WASH ─── */
        .column.drag-over .column-body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, var(--coral-dim) 0%, transparent 60%);
            border-radius: 0;
            pointer-events: none;
            animation: wash-in 0.25s var(--ease-out);
        }

        @keyframes wash-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ─── CARDS ─── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.9rem 1rem 0.8rem;
            cursor: grab;
            transition: transform 0.22s var(--ease-out),
                        box-shadow 0.22s var(--ease-out),
                        border-color 0.22s,
                        background 0.22s;
            position: relative;
            overflow: hidden;
            will-change: transform;
            animation: card-in 0.35s var(--ease-out) both;
        }

        @keyframes card-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Priority left-glow */
        .card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            border-radius: 8px 0 0 8px;
            transition: box-shadow 0.3s;
        }

        .card.p-high::before { background: var(--coral); box-shadow: 2px 0 12px var(--coral-glow); }
        .card.p-medium::before { background: var(--amber); }
        .card.p-low::before { background: var(--text-dim); }

        .card:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-mid);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.35);
        }

        .card.p-high:hover::before { box-shadow: 2px 0 20px var(--coral-glow); }

        .card:active { cursor: grabbing; }

        .card.dragging {
            opacity: 0.35;
            transform: scale(0.97);
        }

        .card-delete {
            position: absolute;
            top: 0.55rem; right: 0.55rem;
            width: 18px; height: 18px;
            border-radius: 4px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.8rem;
            line-height: 1;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .card:hover .card-delete { display: flex; }
        .card-delete:hover { background: var(--coral-dim); color: var(--coral); }

        .card-title {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text);
            line-height: 1.45;
            margin-bottom: 0.45rem;
            padding-right: 1rem;
        }

        .card-description {
            font-size: 0.75rem;
            color: var(--text-muted);
            line-height: 1.55;
            margin-bottom: 0.7rem;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-tags { display: flex; gap: 0.35rem; flex-wrap: wrap; }

        .tag {
            font-size: 0.62rem;
            font-weight: 600;
            padding: 0.15rem 0.45rem;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-family: var(--font-mono);
        }

        .tag-high { background: var(--coral-dim); color: var(--coral); }
        .tag-medium { background: var(--amber-dim); color: var(--amber); }
        .tag-low { background: rgba(255,255,255,0.05); color: var(--text-dim); }
        .tag-feature { background: var(--blue-dim); color: var(--blue); }
        .tag-bug { background: var(--coral-dim); color: var(--coral); }
        .tag-design { background: var(--purple-dim); color: var(--purple); }

        .card-meta { display: flex; align-items: center; gap: 0.5rem; }

        .card-due {
            font-size: 0.65rem;
            color: var(--text-dim);
            font-family: var(--font-mono);
        }
        .card-due.overdue { color: var(--coral); }

        .card-avatar {
            width: 20px; height: 20px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.53rem;
            font-weight: 700;
        }

        /* ─── ADD CARD ─── */
        .add-card-btn {
            margin: 0 0.75rem 0.75rem;
            padding: 0.6rem;
            border: 1px dashed var(--border);
            border-radius: 6px;
            background: transparent;
            color: var(--text-dim);
            font-family: var(--font);
            font-size: 0.75rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.2s var(--ease-sharp);
            display: flex; align-items: center; justify-content: center; gap: 0.4rem;
            flex-shrink: 0;
            position: relative;
            z-index: 2;
        }

        .add-card-btn:hover {
            border-color: var(--coral);
            color: var(--coral);
            background: var(--coral-dim);
        }

        /* ─── MODAL ─── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            animation: overlay-in 0.2s var(--ease-out);
        }

        @keyframes overlay-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: var(--bg-panel);
            border: 1px solid var(--border-mid);
            border-radius: 12px;
            padding: 1.75rem;
            width: 440px;
            max-width: 90vw;
            box-shadow: 0 32px 80px rgba(0,0,0,0.6);
            animation: modal-in 0.3s var(--ease-out);
        }

        @keyframes modal-in {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
        }

        .modal-close {
            width: 28px; height: 28px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .modal-close:hover { background: rgba(255,255,255,0.06); color: var(--text); }

        .form-group { margin-bottom: 1rem; }

        .form-group label {
            display: block;
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.35rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-family: var(--font-mono);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: var(--font);
            font-size: 0.83rem;
            color: var(--text);
            background: var(--bg-input);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--coral);
            box-shadow: 0 0 0 3px var(--coral-dim);
        }

        .form-group input.shake {
            animation: shake 0.35s var(--ease-out);
            border-color: var(--coral);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-3px); }
            80% { transform: translateX(3px); }
        }

        .form-group textarea { resize: vertical; min-height: 65px; }
        .form-group select { cursor: pointer; }
        .form-group select option { background: #1a1d25; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .modal-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 900px) {
            .board { flex-direction: column; }
            .column { min-width: auto; }
            .sprint-strip { gap: 1rem; overflow-x: auto; }
        }

        /* ─── REDUCED MOTION ─── */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

<div class="demo-banner">
    Portfolio Demo — Built by <a href="https://tesselo.dev">Tesselo</a> using AI-assisted development
</div>

<header class="header">
    <div class="header-left">
        <div class="logo">kan<em>flow</em></div>
        <span class="project-pill">Website Redesign</span>
    </div>
    <div class="header-right">
        <div class="avatar-group">
            <div class="avatar av-coral" title="Finn A.">FA</div>
            <div class="avatar av-green" title="Sarah K.">SK</div>
            <div class="avatar av-purple" title="Max J.">MJ</div>
            <div class="avatar av-amber" title="Ruby L.">RL</div>
        </div>
        <button class="btn btn-primary" onclick="openModal('todo')">
            <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
                <path d="M5.5 1v9M1 5.5h9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            New Task
        </button>
    </div>
</header>

<!-- SPRINT DASHBOARD STRIP -->
<div class="sprint-strip">
    <div class="sprint-stat">
        <span class="sprint-label">Sprint</span>
        <span class="sprint-value">2 · Apr</span>
    </div>
    <div class="sprint-divider"></div>
    <div class="sprint-stat">
        <span class="sprint-label">Days left</span>
        <span class="sprint-value" id="days-left">—</span>
    </div>
    <div class="sprint-divider"></div>
    <div class="sprint-stat">
        <span class="sprint-label">Velocity</span>
        <div class="sparkline" id="sparkline">
            <div class="spark-bar" style="height:8px"></div>
            <div class="spark-bar med" style="height:12px"></div>
            <div class="spark-bar med" style="height:10px"></div>
            <div class="spark-bar active" style="height:16px"></div>
            <div class="spark-bar active" style="height:18px"></div>
            <div class="spark-bar active" style="height:20px"></div>
        </div>
    </div>
    <div class="sprint-divider"></div>
    <div class="progress-track-wrap">
        <span class="sprint-label">Progress</span>
        <div class="progress-track">
            <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>
        <span class="progress-pct" id="progress-pct">0%</span>
    </div>
</div>

<div class="board" id="board"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" style="display:none;" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
            <div class="modal-title">New Task</div>
            <button class="modal-close" onclick="document.getElementById('modal').style.display='none'">✕</button>
        </div>
        <div class="form-group">
            <label>Title</label>
            <input type="text" id="task-title" placeholder="What needs to be done?">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="task-desc" placeholder="Add some context…"></textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Priority</label>
                <select id="task-priority">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            <div class="form-group">
                <label>Type</label>
                <select id="task-type">
                    <option value="feature">Feature</option>
                    <option value="bug">Bug</option>
                    <option value="design">Design</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Assignee</label>
                <select id="task-assignee">
                    <option value="FA">Finn A.</option>
                    <option value="SK">Sarah K.</option>
                    <option value="MJ">Max J.</option>
                    <option value="RL">Ruby L.</option>
                </select>
            </div>
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" id="task-due">
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-ghost" onclick="document.getElementById('modal').style.display='none'">Cancel</button>
            <button class="btn btn-primary" onclick="addTask()">Create Task</button>
        </div>
    </div>
</div>

<script>
    const avatarColors = { 'FA':'av-coral', 'SK':'av-green', 'MJ':'av-purple', 'RL':'av-amber' };

    let tasks = [
        { id:1,  title:'Design new landing page hero',      description:'Create wireframes and final mockup for the updated hero section with animation concepts.',      column:'done',     priority:'high',   type:'design',  assignee:'FA', due:'2026-03-25' },
        { id:2,  title:'Implement authentication flow',      description:'Set up sign-up, login, and password reset using OAuth 2.0.',                                    column:'done',     priority:'high',   type:'feature', assignee:'SK', due:'2026-03-26' },
        { id:3,  title:'Build dashboard API endpoints',      description:'REST API for user analytics, activity feed, and notification preferences.',                      column:'progress', priority:'high',   type:'feature', assignee:'FA', due:'2026-03-30' },
        { id:4,  title:'Fix mobile nav z-index bug',         description:'Navigation overlay clips behind hero carousel on iOS Safari.',                                   column:'progress', priority:'medium', type:'bug',     assignee:'MJ', due:'2026-03-29' },
        { id:5,  title:'Design onboarding illustrations',    description:'Create 4 custom illustrations for the onboarding carousel screens.',                             column:'progress', priority:'low',    type:'design',  assignee:'RL', due:'2026-04-02' },
        { id:6,  title:'Set up CI/CD pipeline',              description:'Configure GitHub Actions for automated testing and deployment to staging.',                       column:'todo',     priority:'medium', type:'feature', assignee:'SK', due:'2026-04-01' },
        { id:7,  title:'Write API documentation',            description:'Document all endpoints with request/response examples using OpenAPI spec.',                      column:'todo',     priority:'low',    type:'feature', assignee:'FA', due:'2026-04-05' },
        { id:8,  title:'Accessibility audit',                description:'Run WCAG 2.1 AA audit and fix critical issues across all pages.',                                column:'todo',     priority:'high',   type:'bug',     assignee:'MJ', due:'2026-04-03' },
        { id:9,  title:'Design email templates',             description:'Responsive HTML templates for welcome, reset password, and weekly digest.',                      column:'todo',     priority:'medium', type:'design',  assignee:'RL', due:'2026-04-07' },
        { id:10, title:'Implement dark mode toggle',         description:'Add theme switcher with system preference detection and local storage.',                         column:'done',     priority:'medium', type:'feature', assignee:'MJ', due:'2026-03-24' },
    ];

    let nextId = 11;
    let modalColumn = 'todo';
    let draggedId = null;

    const columns = [
        { id:'todo',     label:'To Do',       ind:'ind-todo' },
        { id:'progress', label:'In Progress',  ind:'ind-progress' },
        { id:'done',     label:'Done',         ind:'ind-done' },
    ];

    // ─── RENDER ───
    function render(newTaskId = null) {
        const board = document.getElementById('board');
        board.innerHTML = columns.map(col => {
            const colTasks = tasks.filter(t => t.column === col.id);
            return `
                <div class="column" id="col-wrap-${col.id}">
                    <div class="column-header">
                        <div class="column-title-wrap">
                            <span class="col-indicator ${col.ind}"></span>
                            <span class="column-title">${col.label}</span>
                        </div>
                        <span class="column-count" id="count-${col.id}">${colTasks.length}</span>
                    </div>
                    <div class="column-body" id="col-${col.id}"
                        ondragover="handleDragOver(event)"
                        ondragleave="handleDragLeave(event)"
                        ondrop="handleDrop(event, '${col.id}')">
                        ${colTasks.map((t, i) => renderCard(t, i, t.id === newTaskId)).join('')}
                    </div>
                    <button class="add-card-btn" onclick="openModal('${col.id}')">
                        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                            <path d="M5 1v8M1 5h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                        Add task
                    </button>
                </div>
            `;
        }).join('');

        updateProgress();
        updateDaysLeft();
    }

    function renderCard(t, index, isNew) {
        const today = new Date();
        const due = new Date(t.due);
        const isOverdue = t.column !== 'done' && due < today;
        const dueStr = due.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
        const delay = isNew ? 0 : index * 60;

        return `
            <div class="card p-${t.priority}" draggable="true"
                ondragstart="handleDragStart(event, ${t.id})"
                ondragend="handleDragEnd(event)"
                id="card-${t.id}"
                style="animation-delay:${delay}ms">
                <button class="card-delete" onclick="deleteTask(${t.id})" title="Delete">✕</button>
                <div class="card-title">${t.title}</div>
                <div class="card-description">${t.description}</div>
                <div class="card-footer">
                    <div class="card-tags">
                        <span class="tag tag-${t.priority}">${t.priority}</span>
                        <span class="tag tag-${t.type}">${t.type}</span>
                    </div>
                    <div class="card-meta">
                        <span class="card-due ${isOverdue ? 'overdue' : ''}">${dueStr}</span>
                        <div class="card-avatar ${avatarColors[t.assignee]}">${t.assignee}</div>
                    </div>
                </div>
            </div>
        `;
    }

    function updateProgress() {
        const done = tasks.filter(t => t.column === 'done').length;
        const total = tasks.length;
        const pct = total === 0 ? 0 : Math.round((done / total) * 100);
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('progress-pct').textContent = pct + '%';
    }

    function updateDaysLeft() {
        const sprintEnd = new Date('2026-04-14');
        const now = new Date();
        const diff = Math.max(0, Math.ceil((sprintEnd - now) / (1000*60*60*24)));
        document.getElementById('days-left').textContent = diff + 'd';
    }

    // ─── DRAG & DROP ───
    function handleDragStart(e, id) {
        draggedId = id;
        e.target.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
    }

    function handleDragEnd(e) {
        e.target.classList.remove('dragging');
        document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
    }

    function handleDragOver(e) {
        e.preventDefault();
        const col = e.currentTarget.closest('.column');
        if (col) col.classList.add('drag-over');
    }

    function handleDragLeave(e) {
        const col = e.currentTarget.closest('.column');
        const related = e.relatedTarget;
        if (col && !col.contains(related)) col.classList.remove('drag-over');
    }

    function handleDrop(e, column) {
        e.preventDefault();
        document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
        if (draggedId !== null) {
            const task = tasks.find(t => t.id === draggedId);
            if (task && task.column !== column) {
                task.column = column;
                render();
                // Pop the count badge
                setTimeout(() => {
                    const badge = document.getElementById('count-' + column);
                    if (badge) { badge.classList.remove('pop'); void badge.offsetWidth; badge.classList.add('pop'); }
                }, 50);
            }
            draggedId = null;
        }
    }

    // ─── MODAL ───
    function openModal(col) {
        modalColumn = col;
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('task-title').value = '';
        document.getElementById('task-desc').value = '';
        document.getElementById('task-priority').value = 'medium';
        document.getElementById('task-type').value = 'feature';
        document.getElementById('task-assignee').value = 'FA';
        document.getElementById('task-due').value = '';
        setTimeout(() => document.getElementById('task-title').focus(), 150);
    }

    function closeModal(e) {
        if (e.target === e.currentTarget) document.getElementById('modal').style.display = 'none';
    }

    function addTask() {
        const titleEl = document.getElementById('task-title');
        const title = titleEl.value.trim();
        if (!title) {
            titleEl.classList.remove('shake');
            void titleEl.offsetWidth;
            titleEl.classList.add('shake');
            titleEl.focus();
            return;
        }

        const task = {
            id: nextId++,
            title,
            description: document.getElementById('task-desc').value.trim() || 'No description provided.',
            column: modalColumn,
            priority: document.getElementById('task-priority').value,
            type: document.getElementById('task-type').value,
            assignee: document.getElementById('task-assignee').value,
            due: document.getElementById('task-due').value || '2026-04-15'
        };

        tasks.push(task);
        document.getElementById('modal').style.display = 'none';
        render(task.id);
    }

    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        render();
    }

    // ─── KEYBOARD ───
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') document.getElementById('modal').style.display = 'none';
        if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openModal('todo'); }
    });

    // Remove shake class after animation
    document.addEventListener('animationend', e => {
        if (e.target.classList.contains('shake')) e.target.classList.remove('shake');
    });

    // ─── INIT ───
    render();
</script>

</body>
</html>
