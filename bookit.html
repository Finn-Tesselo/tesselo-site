<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookIt — Wellness Studio Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sage: #7a8c6e;
            --sage-light: #a3b496;
            --sage-pale: #dce4d6;
            --sand: #c4b59a;
            --sand-light: #e8dfd0;
            --cream: #f7f4ef;
            --warm-white: #fdfcfa;
            --bark: #3d3428;
            --bark-light: #5c5043;
            --text: #2c2720;
            --text-muted: #8a8279;
            --accent: #b86e4a;
            --accent-hover: #a35d3b;
            --border: #e5dfd7;
            --shadow: rgba(61, 52, 40, 0.08);
            --font-serif: 'Cormorant Garamond', Georgia, serif;
            --font-sans: 'Outfit', -apple-system, sans-serif;
            --radius: 12px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        ::selection { background: var(--sage-pale); color: var(--bark); }

        html { font-size: 16px; scroll-behavior: smooth; }

        body {
            font-family: var(--font-sans);
            font-weight: 300;
            color: var(--text);
            background: var(--cream);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* ─── HEADER ─── */
        .header {
            background: var(--warm-white);
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(12px);
        }

        .logo {
            font-family: var(--font-serif);
            font-size: 1.6rem;
            font-weight: 500;
            color: var(--bark);
            letter-spacing: -0.01em;
        }

        .logo span { color: var(--sage); }

        .header-nav {
            display: flex;
            gap: 0.5rem;
        }

        .header-nav button {
            font-family: var(--font-sans);
            font-size: 0.8rem;
            font-weight: 400;
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.3s;
            background: transparent;
            color: var(--text-muted);
        }

        .header-nav button:hover { color: var(--text); background: var(--sage-pale); }

        .header-nav button.active {
            background: var(--sage);
            color: white;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--accent);
            color: white;
            font-size: 0.65rem;
            font-weight: 600;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            margin-left: 0.4rem;
        }

        /* ─── MAIN LAYOUT ─── */
        .app-container {
            max-width: 960px;
            margin: 0 auto;
            padding: 2.5rem 2rem 4rem;
        }

        .page-title {
            font-family: var(--font-serif);
            font-size: 2.25rem;
            font-weight: 400;
            color: var(--bark);
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
        }

        /* ─── STEPS INDICATOR ─── */
        .steps {
            display: flex;
            align-items: center;
            gap: 0;
            margin-bottom: 3rem;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.8rem;
            font-weight: 400;
            color: var(--text-muted);
            transition: color 0.3s;
        }

        .step-item.active { color: var(--sage); font-weight: 500; }
        .step-item.completed { color: var(--sage-light); }

        .step-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1.5px solid var(--border);
            transition: all 0.3s;
        }

        .step-item.active .step-num {
            background: var(--sage);
            color: white;
            border-color: var(--sage);
        }

        .step-item.completed .step-num {
            background: var(--sage-pale);
            color: var(--sage);
            border-color: var(--sage-pale);
        }

        .step-line {
            flex: 1;
            height: 1px;
            background: var(--border);
            margin: 0 1rem;
        }

        .step-line.completed { background: var(--sage-pale); }

        /* ─── SERVICE CARDS ─── */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }

        .service-card {
            background: var(--warm-white);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 1.75rem;
            cursor: pointer;
            transition: all 0.35s ease;
            position: relative;
            overflow: hidden;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--sage);
            transform: scaleX(0);
            transition: transform 0.35s ease;
        }

        .service-card:hover {
            border-color: var(--sage-light);
            box-shadow: 0 4px 20px var(--shadow);
            transform: translateY(-2px);
        }

        .service-card:hover::before { transform: scaleX(1); }

        .service-card.selected {
            border-color: var(--sage);
            background: linear-gradient(to bottom, var(--sage-pale), var(--warm-white));
        }

        .service-card.selected::before { transform: scaleX(1); }

        .service-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: var(--sage-pale);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }

        .service-card h3 {
            font-family: var(--font-serif);
            font-size: 1.3rem;
            font-weight: 500;
            color: var(--bark);
            margin-bottom: 0.4rem;
        }

        .service-meta {
            display: flex;
            gap: 1rem;
            margin-bottom: 0.6rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .service-card p {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .service-price {
            font-family: var(--font-serif);
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--sage);
            margin-top: 1rem;
        }

        /* ─── CALENDAR ─── */
        .calendar-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .calendar {
            background: var(--warm-white);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .calendar-header h3 {
            font-family: var(--font-serif);
            font-size: 1.15rem;
            font-weight: 500;
            color: var(--bark);
        }

        .calendar-nav {
            display: flex;
            gap: 0.4rem;
        }

        .calendar-nav button {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .calendar-nav button:hover {
            background: var(--sage-pale);
            border-color: var(--sage-pale);
            color: var(--sage);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }

        .calendar-day-label {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.4rem 0;
        }

        .calendar-day {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 50%;
            border: none;
            background: transparent;
            font-family: var(--font-sans);
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .calendar-day:hover:not(.disabled):not(.empty) {
            background: var(--sage-pale);
            color: var(--sage);
        }

        .calendar-day.selected {
            background: var(--sage);
            color: white;
            font-weight: 500;
        }

        .calendar-day.today {
            border: 1.5px solid var(--sage);
            font-weight: 500;
        }

        .calendar-day.disabled {
            color: var(--border);
            cursor: not-allowed;
        }

        .calendar-day.empty { cursor: default; }

        /* ─── TIME SLOTS ─── */
        .time-slots {
            background: var(--warm-white);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
        }

        .time-slots h3 {
            font-family: var(--font-serif);
            font-size: 1.15rem;
            font-weight: 500;
            color: var(--bark);
            margin-bottom: 0.4rem;
        }

        .time-slots-date {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1.25rem;
        }

        .time-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
        }

        .time-slot {
            padding: 0.75rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: transparent;
            font-family: var(--font-sans);
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .time-slot:hover {
            border-color: var(--sage-light);
            background: var(--sage-pale);
        }

        .time-slot.selected {
            border-color: var(--sage);
            background: var(--sage);
            color: white;
            font-weight: 500;
        }

        .time-slot.unavailable {
            color: var(--border);
            cursor: not-allowed;
            text-decoration: line-through;
        }

        .no-date-selected {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
        }

        .no-date-selected .icon { font-size: 2rem; margin-bottom: 0.75rem; opacity: 0.4; }

        /* ─── BOOKING FORM ─── */
        .form-card {
            background: var(--warm-white);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            max-width: 520px;
        }

        .form-summary {
            background: var(--sage-pale);
            border-radius: var(--radius-sm);
            padding: 1.25rem;
            margin-bottom: 2rem;
        }

        .form-summary h4 {
            font-family: var(--font-serif);
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--bark);
            margin-bottom: 0.5rem;
        }

        .form-summary p {
            font-size: 0.85rem;
            color: var(--bark-light);
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--bark-light);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: var(--font-sans);
            font-size: 0.9rem;
            font-weight: 300;
            color: var(--text);
            background: var(--cream);
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--sage);
        }

        .form-group textarea { resize: vertical; min-height: 80px; }

        /* ─── BUTTONS ─── */
        .btn {
            font-family: var(--font-sans);
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.85rem 2rem;
            border-radius: 100px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--sage);
            color: white;
        }

        .btn-primary:hover { background: var(--bark); }

        .btn-secondary {
            background: transparent;
            color: var(--text-muted);
            border: 1.5px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--sage-light);
            color: var(--text);
        }

        .btn-row {
            display: flex;
            gap: 0.75rem;
            margin-top: 2rem;
        }

        /* ─── CONFIRMATION ─── */
        .confirmation {
            text-align: center;
            max-width: 480px;
            margin: 0 auto;
        }

        .confirmation-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--sage-pale);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 1.5rem;
            animation: scaleIn 0.5s ease;
        }

        @keyframes scaleIn {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }

        .confirmation h2 {
            font-family: var(--font-serif);
            font-size: 2rem;
            font-weight: 400;
            color: var(--bark);
            margin-bottom: 0.5rem;
        }

        .confirmation > p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .confirmation-details {
            background: var(--warm-white);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            text-align: left;
            margin-bottom: 2rem;
        }

        .confirmation-row {
            display: flex;
            justify-content: space-between;
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .confirmation-row:last-child { border-bottom: none; }

        .confirmation-row .label { color: var(--text-muted); }
        .confirmation-row .value { font-weight: 400; color: var(--bark); }

        /* ─── MY BOOKINGS ─── */
        .bookings-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .booking-card {
            background: var(--warm-white);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .booking-card:hover {
            box-shadow: 0 4px 16px var(--shadow);
        }

        .booking-info h4 {
            font-family: var(--font-serif);
            font-size: 1.15rem;
            font-weight: 500;
            color: var(--bark);
            margin-bottom: 0.3rem;
        }

        .booking-info p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .booking-status {
            font-size: 0.75rem;
            font-weight: 500;
            padding: 0.4rem 1rem;
            border-radius: 100px;
            background: var(--sage-pale);
            color: var(--sage);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.3; }

        .empty-state h3 {
            font-family: var(--font-serif);
            font-size: 1.4rem;
            font-weight: 400;
            color: var(--bark-light);
            margin-bottom: 0.4rem;
        }

        /* ─── FADE ANIMATION ─── */
        .fade-in {
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ─── DEMO BANNER ─── */
        .demo-banner {
            background: var(--bark);
            color: var(--sand-light);
            text-align: center;
            padding: 0.6rem 1rem;
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.03em;
        }

        .demo-banner strong { color: white; font-weight: 500; }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 700px) {
            .header { padding: 1rem 1.25rem; }
            .app-container { padding: 1.5rem 1.25rem 3rem; }
            .page-title { font-size: 1.75rem; }
            .calendar-section { grid-template-columns: 1fr; }
            .services-grid { grid-template-columns: 1fr; }
            .steps { display: none; }
            .time-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="demo-banner">
    <strong>Portfolio Demo</strong> — Built by <a href="https://tesselo.dev" style="color: var(--sand-light); text-decoration: underline;">Tesselo</a> using AI-assisted development
</div>

<header class="header">
    <div class="logo">book<span>it</span></div>
    <nav class="header-nav">
        <button class="active" onclick="showView('book')" id="nav-book">Book</button>
        <button onclick="showView('bookings')" id="nav-bookings">My Bookings <span class="badge" id="bookings-badge" style="display:none">0</span></button>
    </nav>
</header>

<div class="app-container" id="app">
</div>

<script>
    // ─── STATE ───
    let state = {
        view: 'book',
        step: 1,
        selectedService: null,
        selectedDate: null,
        selectedTime: null,
        currentMonth: new Date().getMonth(),
        currentYear: new Date().getFullYear(),
        formData: { name: '', email: '', notes: '' },
        bookings: []
    };

    // ─── DATA ───
    const services = [
        {
            id: 1,
            name: 'Deep Tissue Massage',
            duration: '60 min',
            price: 75,
            icon: '🌿',
            description: 'Targeted pressure to release chronic muscle tension and restore deep mobility.',
            category: 'Massage'
        },
        {
            id: 2,
            name: 'Swedish Relaxation',
            duration: '45 min',
            price: 55,
            icon: '🕊️',
            description: 'Gentle flowing strokes to calm the nervous system and ease everyday stress.',
            category: 'Massage'
        },
        {
            id: 3,
            name: 'Sports Physiotherapy',
            duration: '45 min',
            price: 65,
            icon: '⚡',
            description: 'Assessment and treatment of sports injuries with a tailored recovery plan.',
            category: 'Physio'
        },
        {
            id: 4,
            name: 'Posture & Alignment',
            duration: '30 min',
            price: 45,
            icon: '🧘',
            description: 'Postural assessment with corrective exercises for long-term balance.',
            category: 'Wellness'
        },
        {
            id: 5,
            name: 'Hot Stone Therapy',
            duration: '75 min',
            price: 90,
            icon: '🪨',
            description: 'Heated basalt stones combined with massage to melt tension and improve circulation.',
            category: 'Massage'
        },
        {
            id: 6,
            name: 'Recovery Consultation',
            duration: '20 min',
            price: 0,
            icon: '💬',
            description: 'Free initial consultation to discuss your needs and build a treatment plan.',
            category: 'Consultation'
        }
    ];

    const timeSlots = [
        '9:00 AM', '9:30 AM', '10:00 AM', '10:30 AM',
        '11:00 AM', '11:30 AM', '12:00 PM', '12:30 PM',
        '2:00 PM', '2:30 PM', '3:00 PM', '3:30 PM',
        '4:00 PM', '4:30 PM', '5:00 PM', '5:30 PM'
    ];

    // Simulate some slots being taken
    const unavailableSlots = {};
    function getUnavailable(dateStr) {
        if (!unavailableSlots[dateStr]) {
            const taken = [];
            const count = Math.floor(Math.random() * 5) + 2;
            for (let i = 0; i < count; i++) {
                taken.push(timeSlots[Math.floor(Math.random() * timeSlots.length)]);
            }
            unavailableSlots[dateStr] = taken;
        }
        return unavailableSlots[dateStr];
    }

    const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

    // ─── RENDER ───
    function render() {
        const app = document.getElementById('app');
        if (state.view === 'book') {
            app.innerHTML = renderBooking();
        } else if (state.view === 'bookings') {
            app.innerHTML = renderMyBookings();
        }
        updateNav();
        updateBadge();
    }

    function updateNav() {
        document.getElementById('nav-book').className = state.view === 'book' ? 'active' : '';
        document.getElementById('nav-bookings').className = state.view === 'bookings' ? 'active' : '';
    }

    function updateBadge() {
        const badge = document.getElementById('bookings-badge');
        if (state.bookings.length > 0) {
            badge.style.display = 'inline-flex';
            badge.textContent = state.bookings.length;
        } else {
            badge.style.display = 'none';
        }
    }

    function showView(view) {
        state.view = view;
        render();
    }

    // ─── BOOKING FLOW ───
    function renderBooking() {
        const steps = renderSteps();
        let content = '';

        if (state.step === 1) content = renderServices();
        else if (state.step === 2) content = renderCalendar();
        else if (state.step === 3) content = renderForm();
        else if (state.step === 4) content = renderConfirmation();

        const title = state.step === 4 ? '' : `
            <h1 class="page-title">${['', 'Choose a Service', 'Pick a Date & Time', 'Your Details', ''][state.step]}</h1>
            <p class="page-subtitle">${['', 'Select the treatment that\'s right for you.', 'Find a time that works for your schedule.', 'Almost there — just a few details to confirm.', ''][state.step]}</p>
        `;

        return `<div class="fade-in">${state.step < 4 ? steps : ''}${title}${content}</div>`;
    }

    function renderSteps() {
        const stepNames = ['Service', 'Date & Time', 'Details'];
        return `<div class="steps">${stepNames.map((name, i) => {
            const num = i + 1;
            const cls = num === state.step ? 'active' : num < state.step ? 'completed' : '';
            const line = i < stepNames.length - 1 ? `<div class="step-line ${num < state.step ? 'completed' : ''}"></div>` : '';
            return `<div class="step-item ${cls}"><span class="step-num">${num < state.step ? '✓' : num}</span>${name}</div>${line}`;
        }).join('')}</div>`;
    }

    function renderServices() {
        return `<div class="services-grid">${services.map(s => `
            <div class="service-card ${state.selectedService?.id === s.id ? 'selected' : ''}" onclick="selectService(${s.id})">
                <div class="service-icon">${s.icon}</div>
                <h3>${s.name}</h3>
                <div class="service-meta">
                    <span>${s.duration}</span>
                    <span>${s.category}</span>
                </div>
                <p>${s.description}</p>
                <div class="service-price">${s.price === 0 ? 'Free' : '£' + s.price}</div>
            </div>
        `).join('')}</div>
        ${state.selectedService ? `<div class="btn-row"><button class="btn btn-primary" onclick="goToStep(2)">Continue →</button></div>` : ''}`;
    }

    function selectService(id) {
        state.selectedService = services.find(s => s.id === id);
        render();
    }

    function renderCalendar() {
        const year = state.currentYear;
        const month = state.currentMonth;
        const firstDay = new Date(year, month, 1);
        let startDay = firstDay.getDay() - 1;
        if (startDay < 0) startDay = 6;
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const today = new Date();

        let calendarDays = '';
        for (let i = 0; i < startDay; i++) {
            calendarDays += '<div class="calendar-day empty"></div>';
        }
        for (let d = 1; d <= daysInMonth; d++) {
            const date = new Date(year, month, d);
            const isPast = date < new Date(today.getFullYear(), today.getMonth(), today.getDate());
            const isSunday = date.getDay() === 0;
            const isToday = date.toDateString() === today.toDateString();
            const isSelected = state.selectedDate && state.selectedDate.toDateString() === date.toDateString();
            const disabled = isPast || isSunday;

            let cls = 'calendar-day';
            if (disabled) cls += ' disabled';
            if (isToday) cls += ' today';
            if (isSelected) cls += ' selected';

            calendarDays += `<div class="${cls}" onclick="${disabled ? '' : `selectDate(${year},${month},${d})`}">${d}</div>`;
        }

        const selectedDateStr = state.selectedDate ? state.selectedDate.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' }) : null;

        return `<div class="calendar-section">
            <div class="calendar">
                <div class="calendar-header">
                    <h3>${months[month]} ${year}</h3>
                    <div class="calendar-nav">
                        <button onclick="changeMonth(-1)">‹</button>
                        <button onclick="changeMonth(1)">›</button>
                    </div>
                </div>
                <div class="calendar-grid">
                    ${days.map(d => `<div class="calendar-day-label">${d}</div>`).join('')}
                    ${calendarDays}
                </div>
            </div>
            <div class="time-slots">
                <h3>Available Times</h3>
                ${state.selectedDate ? `
                    <p class="time-slots-date">${selectedDateStr}</p>
                    <div class="time-grid">
                        ${timeSlots.map(t => {
                            const dateKey = state.selectedDate.toISOString().split('T')[0];
                            const unavailable = getUnavailable(dateKey).includes(t);
                            const selected = state.selectedTime === t;
                            return `<button class="time-slot ${unavailable ? 'unavailable' : ''} ${selected ? 'selected' : ''}" onclick="${unavailable ? '' : `selectTime('${t}')`}">${t}</button>`;
                        }).join('')}
                    </div>
                ` : `
                    <div class="no-date-selected">
                        <div class="icon">📅</div>
                        Select a date to see<br>available time slots
                    </div>
                `}
            </div>
        </div>
        <div class="btn-row">
            <button class="btn btn-secondary" onclick="goToStep(1)">← Back</button>
            ${state.selectedDate && state.selectedTime ? `<button class="btn btn-primary" onclick="goToStep(3)">Continue →</button>` : ''}
        </div>`;
    }

    function selectDate(y, m, d) {
        state.selectedDate = new Date(y, m, d);
        state.selectedTime = null;
        render();
    }

    function selectTime(t) {
        state.selectedTime = t;
        render();
    }

    function changeMonth(dir) {
        state.currentMonth += dir;
        if (state.currentMonth > 11) { state.currentMonth = 0; state.currentYear++; }
        if (state.currentMonth < 0) { state.currentMonth = 11; state.currentYear--; }
        render();
    }

    function renderForm() {
        const svc = state.selectedService;
        const dateStr = state.selectedDate.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        return `<div class="form-card">
            <div class="form-summary">
                <h4>${svc.icon} ${svc.name}</h4>
                <p>${dateStr} at ${state.selectedTime}<br>${svc.duration} · ${svc.price === 0 ? 'Free' : '£' + svc.price}</p>
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Your name" value="${state.formData.name}" oninput="updateForm('name', this.value)">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="your@email.com" value="${state.formData.email}" oninput="updateForm('email', this.value)">
            </div>
            <div class="form-group">
                <label>Notes (optional)</label>
                <textarea placeholder="Any specific areas of concern or preferences...">${state.formData.notes}</textarea>
            </div>
            <div class="btn-row">
                <button class="btn btn-secondary" onclick="goToStep(2)">← Back</button>
                <button class="btn btn-primary" onclick="confirmBooking()">Confirm Booking</button>
            </div>
        </div>`;
    }

    function updateForm(field, value) {
        state.formData[field] = value;
    }

    function confirmBooking() {
        if (!state.formData.name || !state.formData.email) {
            alert('Please fill in your name and email.');
            return;
        }

        const booking = {
            id: Date.now(),
            service: state.selectedService,
            date: state.selectedDate,
            time: state.selectedTime,
            name: state.formData.name,
            email: state.formData.email,
            notes: state.formData.notes
        };

        state.bookings.push(booking);
        state.step = 4;
        state.lastBooking = booking;
        render();
    }

    function renderConfirmation() {
        const b = state.lastBooking;
        const dateStr = b.date.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        return `<div class="confirmation fade-in">
            <div class="confirmation-icon">✓</div>
            <h2>You're booked in</h2>
            <p>A confirmation has been sent to ${b.email}</p>
            <div class="confirmation-details">
                <div class="confirmation-row"><span class="label">Service</span><span class="value">${b.service.name}</span></div>
                <div class="confirmation-row"><span class="label">Date</span><span class="value">${dateStr}</span></div>
                <div class="confirmation-row"><span class="label">Time</span><span class="value">${b.time}</span></div>
                <div class="confirmation-row"><span class="label">Duration</span><span class="value">${b.service.duration}</span></div>
                <div class="confirmation-row"><span class="label">Price</span><span class="value">${b.service.price === 0 ? 'Free' : '£' + b.service.price}</span></div>
                <div class="confirmation-row"><span class="label">Name</span><span class="value">${b.name}</span></div>
            </div>
            <div class="btn-row" style="justify-content: center;">
                <button class="btn btn-secondary" onclick="bookAnother()">Book Another</button>
                <button class="btn btn-primary" onclick="showView('bookings')">View My Bookings</button>
            </div>
        </div>`;
    }

    function bookAnother() {
        state.step = 1;
        state.selectedService = null;
        state.selectedDate = null;
        state.selectedTime = null;
        state.formData = { name: state.formData.name, email: state.formData.email, notes: '' };
        render();
    }

    // ─── MY BOOKINGS ───
    function renderMyBookings() {
        if (state.bookings.length === 0) {
            return `<div class="fade-in">
                <h1 class="page-title">My Bookings</h1>
                <p class="page-subtitle">Your upcoming appointments.</p>
                <div class="empty-state">
                    <div class="icon">📋</div>
                    <h3>No bookings yet</h3>
                    <p>Book your first treatment to get started.</p>
                    <div class="btn-row" style="justify-content: center; margin-top: 1.5rem;">
                        <button class="btn btn-primary" onclick="showView('book')">Book Now</button>
                    </div>
                </div>
            </div>`;
        }

        return `<div class="fade-in">
            <h1 class="page-title">My Bookings</h1>
            <p class="page-subtitle">${state.bookings.length} upcoming appointment${state.bookings.length > 1 ? 's' : ''}.</p>
            <div class="bookings-list">
                ${state.bookings.map(b => {
                    const dateStr = b.date.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
                    return `<div class="booking-card">
                        <div class="booking-info">
                            <h4>${b.service.icon} ${b.service.name}</h4>
                            <p>${dateStr} at ${b.time} · ${b.service.duration}</p>
                        </div>
                        <span class="booking-status">Confirmed</span>
                    </div>`;
                }).join('')}
            </div>
            <div class="btn-row" style="margin-top: 2rem;">
                <button class="btn btn-primary" onclick="showView('book')">Book Another</button>
            </div>
        </div>`;
    }

    function goToStep(n) {
        state.step = n;
        render();
    }

    // ─── INIT ───
    render();
</script>

</body>
</html>
